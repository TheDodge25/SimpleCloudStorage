services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - appnet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Port 8000 is NOT exposed to the host — all traffic goes through nginx on port 80.
    # Uncomment the line below temporarily if you need direct backend access for debugging.
    # ports:
    #   - "8000:8000"
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  mongo:
    image: mongo:8
    # Port 27017 is NOT exposed to the host — internal network only.
    # Uncomment for local debugging with MongoDB Compass:
    # ports:
    #   - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    # Ports 9000 and 9001 are NOT exposed to the host — internal network only.
    # Uncomment for local debugging with the MinIO console:
    # ports:
    #   - "9000:9000"
    #   - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

volumes:
  mongo_data:
  minio_data:

networks:
  appnet:
    driver: bridge
